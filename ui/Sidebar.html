<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f8f9fa;
    }

    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
      color: white;
      padding: 20px 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 11px;
      opacity: 0.9;
    }

    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .quick-actions {
      padding: 12px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
    }

    .quick-actions h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: #5f6368;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .quick-btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .quick-btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 10px 8px;
      border-radius: 8px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: background 0.2s;
    }

    .quick-btn:hover {
      background: #1557b0;
    }

    .quick-btn .icon {
      font-size: 18px;
    }

    .section {
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
      background: white;
      margin-top: 8px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #202124;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-title .icon {
      font-size: 16px;
    }

    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tool-btn {
      background: #f1f3f4;
      border: none;
      padding: 10px 12px;
      border-radius: 6px;
      text-align: left;
      cursor: pointer;
      font-size: 12px;
      color: #202124;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-btn:hover {
      background: #e8eaed;
    }

    .tool-btn .icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
    }

    .status-bar {
      padding: 12px;
      background: white;
      margin-top: 8px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 11px;
      border-bottom: 1px solid #f1f3f4;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      color: #5f6368;
    }

    .status-value {
      font-weight: 500;
      color: #202124;
    }

    .status-value.ready {
      color: #1e8e3e;
    }

    .status-value.missing {
      color: #d93025;
    }

    .init-btn {
      width: 100%;
      background: #1a73e8;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .init-btn:hover {
      background: #1557b0;
    }

    .footer {
      padding: 12px;
      text-align: center;
      font-size: 10px;
      color: #80868b;
    }

    .footer a {
      color: #1a73e8;
      text-decoration: none;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #1a73e8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .collapsible {
      cursor: pointer;
      user-select: none;
    }

    .collapsible::after {
      content: '▼';
      font-size: 8px;
      margin-left: auto;
      transition: transform 0.2s;
    }

    .collapsible.collapsed::after {
      transform: rotate(-90deg);
    }

    .tool-list.collapsed {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo" id="logoIcon">🏢</div>
    <h1 id="companyTitle">Workspace Tools</h1>
    <div class="subtitle">Google Workspace Setup Suite</div>
  </div>

  <div class="quick-actions">
    <h3>Quick Actions</h3>
    <div class="quick-btn-grid">
      <button class="quick-btn" onclick="runAction('quickCreateFolders')">
        <span class="icon">📁</span>
        <span>Create Folders</span>
      </button>
      <button class="quick-btn" onclick="runAction('quickScanDrive')">
        <span class="icon">🔍</span>
        <span>Scan Drive</span>
      </button>
      <button class="quick-btn" onclick="runAction('quickCreateLabels')">
        <span class="icon">🏷️</span>
        <span>Create Labels</span>
      </button>
      <button class="quick-btn" onclick="runAction('quickDailyDigest')">
        <span class="icon">📬</span>
        <span>Email Digest</span>
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title collapsible" onclick="toggleSection(this)">
      <span class="icon">📁</span>
      <span>Drive Tools</span>
    </div>
    <div class="tool-list">
      <button class="tool-btn" onclick="runAction('createFolderStructure')">
        <span class="icon">➕</span> Create Folder Structure
      </button>
      <button class="tool-btn" onclick="runAction('scanMyDrive')">
        <span class="icon">🔍</span> Scan My Drive
      </button>
      <button class="tool-btn" onclick="runAction('scanSpecificFolder')">
        <span class="icon">📂</span> Scan Specific Folder
      </button>
      <button class="tool-btn" onclick="runAction('findDuplicates')">
        <span class="icon">📄</span> Find Duplicates
      </button>
      <button class="tool-btn" onclick="runAction('findLargeFiles')">
        <span class="icon">📦</span> Find Large Files
      </button>
      <button class="tool-btn" onclick="runAction('findOldFiles')">
        <span class="icon">📅</span> Find Old Files
      </button>
      <button class="tool-btn" onclick="runAction('generateRecommendations')">
        <span class="icon">💡</span> Move Recommendations
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title collapsible" onclick="toggleSection(this)">
      <span class="icon">📧</span>
      <span>Gmail Tools</span>
    </div>
    <div class="tool-list">
      <button class="tool-btn" onclick="runAction('createAllLabels')">
        <span class="icon">🏷️</span> Create Gmail Labels
      </button>
      <button class="tool-btn" onclick="runAction('listExistingLabels')">
        <span class="icon">📋</span> List Existing Labels
      </button>
      <button class="tool-btn" onclick="runAction('autoLabelInbox')">
        <span class="icon">🤖</span> Auto-Label Inbox
      </button>
      <button class="tool-btn" onclick="runAction('generateDailyDigest')">
        <span class="icon">📬</span> Daily Digest
      </button>
      <button class="tool-btn" onclick="runAction('captureLeadsFromEmail')">
        <span class="icon">🎯</span> Capture Email Leads
      </button>
      <button class="tool-btn" onclick="runAction('archiveOldNewsletters')">
        <span class="icon">🗃️</span> Archive Newsletters
      </button>
      <button class="tool-btn" onclick="runAction('archiveOldPromotions')">
        <span class="icon">📢</span> Archive Promotions
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title collapsible" onclick="toggleSection(this)">
      <span class="icon">📊</span>
      <span>Reports</span>
    </div>
    <div class="tool-list">
      <button class="tool-btn" onclick="runAction('showEmailStatistics')">
        <span class="icon">📈</span> Email Statistics
      </button>
      <button class="tool-btn" onclick="runAction('showUnreadSummary')">
        <span class="icon">📬</span> Unread Summary
      </button>
    </div>
  </div>

  <div class="status-bar">
    <div class="section-title">
      <span class="icon">⚙️</span>
      <span>System Status</span>
    </div>
    <div id="statusItems">
      <div class="status-item">
        <span class="status-label">Loading...</span>
        <span class="status-value"><div class="spinner"></div></span>
      </div>
    </div>
    <button class="init-btn" onclick="runAction('initializeAllWorkspaceTools')">
      🚀 Initialize All Tools
    </button>
  </div>

  <div class="footer">
    <span id="footerCompany">Workspace Automation</span><br>
    Powered by <a href="#">TNDS Workspace Tools</a>
  </div>

  <script>
    // Run action and show loading state
    function runAction(functionName) {
      // Find the button that was clicked and show loading
      event.target.classList.add('loading');

      google.script.run
        .withSuccessHandler(function() {
          event.target.classList.remove('loading');
        })
        .withFailureHandler(function(err) {
          event.target.classList.remove('loading');
          alert('Error: ' + err.message);
        })
        [functionName]();
    }

    // Toggle collapsible sections
    function toggleSection(element) {
      element.classList.toggle('collapsed');
      const toolList = element.nextElementSibling;
      toolList.classList.toggle('collapsed');
    }

    // Load status on sidebar open
    function loadStatus() {
      google.script.run
        .withSuccessHandler(function(summary) {
          const statusItems = document.getElementById('statusItems');
          statusItems.innerHTML = `
            <div class="status-item">
              <span class="status-label">Sheets</span>
              <span class="status-value">${summary.sheetCount} active</span>
            </div>
            <div class="status-item">
              <span class="status-label">Drive Inventory</span>
              <span class="status-value ${summary.hasInventory ? 'ready' : 'missing'}">
                ${summary.hasInventory ? '✓ Ready' : '✗ Not set up'}
              </span>
            </div>
            <div class="status-item">
              <span class="status-label">Gmail Labels</span>
              <span class="status-value ${summary.hasLabels ? 'ready' : 'missing'}">
                ${summary.hasLabels ? '✓ Ready' : '✗ Not set up'}
              </span>
            </div>
            <div class="status-item">
              <span class="status-label">Auto-Label Rules</span>
              <span class="status-value ${summary.hasLabelRules ? 'ready' : 'missing'}">
                ${summary.hasLabelRules ? '✓ Ready' : '✗ Not set up'}
              </span>
            </div>
            <div class="status-item">
              <span class="status-label">Captured Leads</span>
              <span class="status-value ${summary.hasCapturedLeads ? 'ready' : 'missing'}">
                ${summary.hasCapturedLeads ? '✓ Ready' : '✗ Not set up'}
              </span>
            </div>
            <div class="status-item">
              <span class="status-label">Email Statistics</span>
              <span class="status-value ${summary.hasEmailStats ? 'ready' : 'missing'}">
                ${summary.hasEmailStats ? '✓ Ready' : '✗ Not set up'}
              </span>
            </div>
          `;
        })
        .withFailureHandler(function(err) {
          document.getElementById('statusItems').innerHTML = `
            <div class="status-item">
              <span class="status-label">Status</span>
              <span class="status-value missing">Error loading</span>
            </div>
          `;
        })
        .getToolsSummary();
    }

    // Load company config
    function loadCompanyConfig() {
      google.script.run
        .withSuccessHandler(function(config) {
          if (config) {
            document.getElementById('logoIcon').textContent = config.icon || '🏢';
            document.getElementById('companyTitle').textContent = config.shortName + ' Tools';
            document.getElementById('footerCompany').textContent = config.name;
          }
        })
        .getCompanyConfig();
    }

    // Load status when page loads
    document.addEventListener('DOMContentLoaded', function() {
      loadCompanyConfig();
      loadStatus();
    });
  </script>
</body>
</html>
